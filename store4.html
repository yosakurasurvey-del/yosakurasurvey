<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ご来店アンケート</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Noto+Sans:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #262220;
  --ink-mid:   #3A342E;
  --sub:       #948C82;
  --border:    #E7E2D9;
  --border-lt: #F0ECE4;
  --bg:        #FFFFFF;
  --card:      #FFFFFF;
  --field:     #FCFBF9;
  --accent:    #B5533D;
  --accent-dk: #8B3F2C;
  --accent-soft:#F5E1D8;
  --white:     #FFFFFF;
}

body {
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 12px 24px;
  font-family: 'Cormorant Garamond', 'Noto Sans JP', 'Noto Sans KR', 'Noto Sans SC', 'Noto Sans TC', 'Noto Sans', sans-serif;
  color: var(--ink);
}

/* 中国語・韓国語表示時、選択肢内の英字(Instagram, Naverなど)だけ少し太くして、
   中国語/韓国語の文字との視覚的な太さのギャップを軽減する */
.opt b.src-en {
  font-weight: 600;
}

/* ── Card ── */
.card {
  width: 100%;
  max-width: 560px;
  margin-top: 24px;
}

/* ── Tablet / iPad (portrait, e.g. iPad mini/Air/Pro portrait) ── */
@media (min-width: 601px) and (max-width: 1024px) {
  .card { max-width: 820px; }
  .card-inner { padding: 68px 76px 60px; }

  .logo-wrap { margin-bottom: 36px; }
  .logo-img { max-width: 320px; max-height: 150px; }

  .mon { font-size: 40px; margin-bottom: 18px; }
  .title-ja { font-size: 38px; font-weight: 500; margin-bottom: 12px; }
  .title-sub { font-size: 22px; }

  .progress-wrap { margin-bottom: 46px; }
  .step-circle { width: 46px; height: 46px; font-size: 18px; }
  .step-label { font-size: 16px; max-width: 90px; }
  .step-connector { max-width: 64px; }

  .q-label { font-size: 19px; margin-bottom: 18px; }
  .q-text { font-size: 33px; font-weight: 500; margin-bottom: 14px; }
  .optional-tag { font-size: 17px; margin-bottom: 28px; }

  .opt { padding: 20px 26px; font-size: 25px; gap: 18px; font-weight: 500; }
  .other-input { padding: 18px 20px; font-size: 22px; }

  .rating-row { gap: 16px; }
  .rating-opt { padding: 18px 8px 20px; }
  .rating-opt img { max-width: 92px; }
  .rating-opt .rating-num { font-size: 17px; font-weight: 500; }

  .feedback-area { font-size: 23px; min-height: 170px; padding: 18px 20px; }

  .nav { margin-top: 38px; gap: 16px; }
  .btn-back { padding: 18px 30px; font-size: 21px; }
  .btn-next { padding: 20px; font-size: 21px; }

  .ty-main { font-size: 38px; }
  .ty-sub { font-size: 21px; }
  .ty-face { width: 96px; height: 96px; }
  /* max-width は基本ルールの 25% を継承（画面幅に応じて自動で拡大縮小） */
}

/* ── iPad landscape / larger tablet ／ PC(パソコン)サイズにも同じ拡大レイアウトを適用 ── */
@media (min-width: 1025px) {
  .card { max-width: 940px; }
  .card-inner { padding: 76px 92px 68px; }

  .logo-wrap { margin-bottom: 40px; }
  .logo-img { max-width: 360px; max-height: 170px; }

  .mon { font-size: 44px; margin-bottom: 20px; }
  .title-ja { font-size: 42px; font-weight: 500; margin-bottom: 14px; }
  .title-sub { font-size: 23px; }

  .progress-wrap { margin-bottom: 50px; }
  .step-circle { width: 48px; height: 48px; font-size: 19px; }
  .step-label { font-size: 17px; max-width: 100px; }
  .step-connector { max-width: 70px; }

  .q-label { font-size: 20px; margin-bottom: 20px; }
  .q-text { font-size: 36px; font-weight: 500; margin-bottom: 16px; }
  .optional-tag { font-size: 18px; margin-bottom: 30px; }

  .opt { font-size: 27px; padding: 22px 28px; gap: 20px; font-weight: 500; }
  .other-input { padding: 19px 22px; font-size: 23px; }

  .rating-row { gap: 18px; }
  .rating-opt { padding: 20px 10px 22px; }
  .rating-opt img { max-width: 108px; }
  .rating-opt .rating-num { font-size: 18px; font-weight: 500; }

  .feedback-area { font-size: 24px; min-height: 180px; padding: 19px 22px; }

  .nav { margin-top: 40px; gap: 18px; }
  .btn-back { padding: 19px 32px; font-size: 22px; }
  .btn-next { padding: 21px; font-size: 22px; }

  .ty-main { font-size: 40px; }
  .ty-sub { font-size: 22px; }
  .ty-face { width: 104px; height: 104px; }
  /* max-width は基本ルールの 25% を継承（画面幅に応じて自動で拡大縮小） */
}

.card-inner { padding: 40px 40px 36px; }
@media(max-width:480px){ .card-inner { padding: 30px 22px 26px; } }

/* ── Logo ── */
.logo-wrap { text-align: center; margin-bottom: 22px; }
.logo-img {
  display: block;
  margin: 0 auto;
  max-width: 200px;
  max-height: 90px;
  object-fit: contain;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 34px; }
.mon { font-size: 28px; color: var(--accent); line-height: 1; margin-bottom: 10px; letter-spacing: .08em; }
.title-ja {
  font-size: 25px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: .14em;
  margin-bottom: 4px;
}
.title-sub {
  font-size: 15px;
  color: var(--sub);
  letter-spacing: .1em;
  font-style: italic;
}
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 16px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border));
}
.divider::after { background: linear-gradient(270deg, transparent, var(--border)); }
.divider-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

/* ── Progress ── */
.progress-wrap { margin-bottom: 30px; }
.progress-steps {
  display: flex; justify-content: center; gap: 0; align-items: center;
}
.step-node {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.step-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: var(--sub);
  transition: all .4s ease;
  background: var(--white);
  position: relative; z-index: 1;
}
.step-circle.done {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--white);
}
.step-circle.active {
  border-color: var(--accent);
  color: var(--accent-dk);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.step-label {
  font-size: 11px; color: var(--sub); letter-spacing: .06em;
  white-space: nowrap;
  transition: color .3s;
  text-align: center;
  max-width: 56px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.step-node.active .step-label { color: var(--accent-dk); }
.step-connector {
  flex: 1; height: 1px;
  background: var(--border);
  min-width: 16px; max-width: 46px;
  margin-bottom: 18px;
}

/* ── Slide viewport ── */
.slide-viewport { overflow: hidden; position: relative; }

.slide {
  display: none;
  animation: slideIn .45s cubic-bezier(.16,1,.3,1) forwards;
}
.slide.active { display: block; }
.slide.exit {
  display: block;
  animation: slideOut .35s cubic-bezier(.4,0,1,1) forwards;
  pointer-events: none;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(28px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes slideOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-28px); }
}

/* ── Question ── */
.q-label {
  font-size: 12px;
  letter-spacing: .13em;
  color: var(--accent-dk);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: block;
}
.q-text {
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: .04em;
  margin-bottom: 6px;
  line-height: 1.5;
}
.optional-tag {
  font-size: 14px;
  color: var(--sub);
  font-style: italic;
  margin-bottom: 18px;
}

/* ── Options grid ── */
.options { display: flex; flex-direction: column; gap: 8px; }

/* 年代の選択肢だけは、装飾的なCormorant Garamondではなく通常の書体で数字を表示する */
#opts-1 .opt {
  font-family: 'Noto Sans JP', 'Noto Sans', sans-serif;
}

/* 来店きっかけの選択肢は「Google」「Yahoo」等の英字と日本語が混在するため、
   装飾的なCormorant Garamondではなく通常の書体に統一し、太さの差で違和感が出ないようにする */
#opts-3 .opt {
  font-family: 'Noto Sans JP', 'Noto Sans', sans-serif;
  font-weight: 500;
}
.opt {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all .2s;
  background: var(--field);
  color: var(--ink-mid);
  font-family: inherit;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: .02em;
  text-align: left;
  width: 100%;
  position: relative;
  overflow: hidden;
}
.opt::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  transform: scaleY(0);
  transition: transform .2s;
}
.opt:hover { border-color: var(--accent); background: var(--white); }
.opt:hover::before { transform: scaleY(1); }
.opt.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--ink);
}
.opt.selected::before { transform: scaleY(1); }

/* Other free-text input */
.other-input-wrap { margin-top: 10px; }
.other-input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  font-family: inherit;
  font-size: 14px;
  color: var(--ink);
  background: var(--field);
  outline: none;
  transition: border-color .2s;
}
.other-input:focus { border-color: var(--accent); }
.other-input::placeholder { color: var(--sub); font-style: italic; }

/* Rating (square images instead of stars) */
.rating-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}
.rating-opt {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 4px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  background: var(--field);
  transition: all .2s;
  font-family: inherit;
  min-width: 0;
}
.rating-opt img {
  width: 100%;
  max-width: 52px;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  display: block;
  filter: grayscale(100%);
  opacity: .55;
  transition: opacity .2s, transform .2s;
}
.rating-opt .rating-num { font-size: 12px; color: var(--sub); letter-spacing: .02em; text-align: center; }
.rating-opt:hover { border-color: var(--accent); background: var(--white); }
.rating-opt:hover img { opacity: .8; }
.rating-opt.selected { border-color: var(--accent); background: var(--accent-soft); }
.rating-opt.selected img { opacity: 1; transform: scale(1.06); }
.rating-opt.selected .rating-num { color: var(--ink-mid); }
@media (max-width: 380px) {
  .rating-row { gap: 4px; }
  .rating-opt { padding: 8px 2px 10px; }
}

/* Textarea */
.feedback-area {
  width: 100%; min-height: 130px;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 15px;
  font-family: inherit;
  font-size: 17px;
  color: var(--ink);
  background: var(--field);
  resize: vertical;
  outline: none;
  transition: border-color .2s;
  letter-spacing: .02em;
  line-height: 1.7;
}
.feedback-area:focus { border-color: var(--accent); }
.feedback-area::placeholder { color: var(--sub); font-style: italic; }

/* ── Nav buttons ── */
.nav { display: flex; gap: 10px; margin-top: 26px; }
.btn-back {
  padding: 13px 22px;
  background: none;
  border: 1px solid var(--border);
  color: var(--sub);
  border-radius: 8px;
  font-family: inherit;
  font-size: 16px;
  letter-spacing: .08em;
  cursor: pointer;
  transition: all .2s;
}
.btn-back:hover { border-color: var(--sub); color: var(--ink-mid); }
.btn-next {
  flex: 1;
  padding: 15px;
  background: var(--accent);
  border: none;
  color: var(--white);
  border-radius: 8px;
  font-family: inherit;
  font-size: 16px;
  letter-spacing: .12em;
  cursor: pointer;
  transition: all .25s;
  font-weight: 500;
}
.btn-next:hover { background: var(--accent-dk); }
.btn-next:disabled { opacity: .35; cursor: not-allowed; }

/* ── Thank you screen ── */
.thankyou {
  display: none;
  position: relative;
  text-align: center;
  padding: 20px 0 10px;
  overflow: hidden;
}
.thankyou.show { display: block; }

/* Falling sakura petals layer (sits behind the text/logo content) */
.sakura-layer {
  position: absolute;
  inset: -20px 0 0 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.sakura-layer .petal {
  position: absolute;
  top: -24px;
  width: var(--size, 10px);
  height: var(--size, 10px);
  background: linear-gradient(135deg, #F6C9D3 0%, #E9A6B6 60%, var(--accent) 130%);
  border-radius: 0% 60% 0% 60%;
  opacity: 0;
  animation: sakuraFall var(--dur, 5s) linear var(--delay, 0s) forwards;
}
@keyframes sakuraFall {
  0%   { transform: translate(0, 0) rotate(0deg); opacity: 0; }
  10%  { opacity: .55; }
  50%  { transform: translate(var(--drift, 24px), 190px) rotate(calc(var(--rot, 260deg) / 2)); }
  90%  { opacity: .4; }
  100% { transform: translate(calc(var(--drift, 24px) * -1), 380px) rotate(var(--rot, 260deg)); opacity: 0; }
}

.ty-rule,
.ty-main,
.ty-sub,
.ty-face,
.ty-logo-all {
  position: relative;
  z-index: 1;
}

.ty-face {
  display: block;
  margin: 18px auto 0;
  width: 60px;
  height: 60px;
  object-fit: contain;
  filter: grayscale(100%);
  opacity: 0;
  transform: translateY(8px) scale(.8);
  transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
}
.ty-face.visible { opacity: 1; transform: translateY(0) scale(1); }

.ty-logo-all {
  display: block;
  margin: 32px auto 0;
  max-width: 25%;
  width: 100%;
  height: auto;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 1.1s ease, transform 1.1s ease;
}
.ty-logo-all.visible { opacity: 1; transform: translateY(0); }

.ty-rule {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin: 0 auto 22px;
  transition: width 1s ease .3s;
}
.ty-rule.visible { width: 70%; }

.ty-main {
  font-size: 26px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: .12em;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .7s ease .5s, transform .7s ease .5s;
  margin-bottom: 10px;
}
.ty-main.visible { opacity: 1; transform: translateY(0); }

.ty-sub {
  font-size: 14px;
  color: var(--sub);
  letter-spacing: .1em;
  font-style: italic;
  opacity: 0;
  transition: opacity .7s ease .8s;
}
.ty-sub.visible { opacity: 1; }

.ty-smiley {
  font-size: 30px;
  margin-top: 18px;
  opacity: 0;
  transform: translateY(8px) scale(.8);
  transition: opacity .6s ease, transform .6s cubic-bezier(.16,1,.3,1);
}
.ty-smiley.visible { opacity: 1; transform: translateY(0) scale(1); }

@media (prefers-reduced-motion: reduce) {
  .slide, .ty-main, .ty-rule, .ty-face, .ty-logo-all { animation: none !important; transition: none !important; }
  .sakura-layer .petal { animation: none !important; opacity: 0 !important; }
}

</style>
</head>
<body>

<div class="card">
  <div class="card-inner">

    <!-- Logo: 下の LOGO_URL にロゴ画像のURL（またはファイルパス）を設定すると、ここにロゴが表示されます -->
    <div class="logo-wrap" id="logoWrap">
      <a href="store4.html"><img class="logo-img" id="logoImg" alt="Logo"></a>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="title-ja" id="headerTitle">ご来店アンケート</div>
      <div class="title-sub" id="headerSub">Customer Satisfaction Survey</div>
      <div class="divider"><div class="divider-dot"></div></div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-steps" id="progressSteps"></div>
    </div>

    <!-- Slides -->
    <div class="slide-viewport" id="slideViewport">

      <!-- Step: Gender -->
      <div class="slide active" id="slide-0">
        <span class="q-label" id="ql-0"></span>
        <div class="q-text" id="qt-0"></div>
        <div class="options" id="opts-0"></div>
      </div>

      <!-- Step: Age -->
      <div class="slide" id="slide-1">
        <span class="q-label" id="ql-1"></span>
        <div class="q-text" id="qt-1"></div>
        <div class="options" id="opts-1"></div>
        <div class="nav">
          <button class="btn-back" onclick="back(1)">←</button>
        </div>
      </div>

      <!-- Step: Rating -->
      <div class="slide" id="slide-2">
        <span class="q-label" id="ql-2"></span>
        <div class="q-text" id="qt-2"></div>
        <div class="rating-row" id="opts-2"></div>
        <div class="nav">
          <button class="btn-back" onclick="back(2)">←</button>
        </div>
      </div>

      <!-- Step: Source -->
      <div class="slide" id="slide-3">
        <span class="q-label" id="ql-3"></span>
        <div class="q-text" id="qt-3"></div>
        <div class="options" id="opts-3"></div>
        <div class="other-input-wrap" id="sourceOtherWrap" style="display:none;">
          <input type="text" class="other-input" id="sourceOtherInput">
        </div>
        <div class="nav">
          <button class="btn-back" onclick="back(3)">←</button>
          <button class="btn-next" id="btn-3" onclick="next(3)" style="display:none;"></button>
        </div>
      </div>

      <!-- Step: Improvement feedback (shown for every rating) -->
      <div class="slide" id="slide-4">
        <span class="q-label" id="ql-4"></span>
        <div class="q-text" id="qt-4"></div>
        <div class="optional-tag" id="q4-optional"></div>
        <div class="options" id="opts-4"></div>
        <div class="nav">
          <button class="btn-back" onclick="back(4)">←</button>
          <button class="btn-next" id="btn-4" onclick="next(4)"></button>
        </div>
      </div>

      <!-- Step: Final free-text feedback (always shown, optional) -->
      <div class="slide" id="slide-5">
        <span class="q-label" id="ql-5"></span>
        <div class="q-text" id="qt-5"></div>
        <div class="optional-tag" id="q5-optional"></div>
        <textarea class="feedback-area" id="feedback"></textarea>
        <div class="nav">
          <button class="btn-back" onclick="back(5)">←</button>
          <button class="btn-next" id="btn-5" onclick="submitSurvey()"></button>
        </div>
      </div>

    </div>

    <!-- Thank you -->
    <div class="thankyou" id="thankyou">
      <div class="sakura-layer" id="sakuraLayer"></div>
      <div class="ty-rule" id="tyRule"></div>
      <div class="ty-main" id="tyMain"></div>
      <div class="ty-sub" id="tySub"></div>
      <img class="ty-face" id="tyFace" alt="">
    </div>

  </div>
</div>

<script>
// ─── Logo ────────────────────────────────────────────────
// ここにロゴ画像のURL（例: "https://example.com/logo.png"）を入力すると
// ページ上部にロゴが表示されます。空欄の場合はロゴ欄は非表示になります。
const LOGO_URL = "images/logo5.png";
if (LOGO_URL) {
  document.getElementById('logoImg').src = LOGO_URL;
} else {
  document.getElementById('logoWrap').style.display = 'none';
}

// ─── Rating images (square) ─────────────────────────────────
// 評価1〜5に対応する正方形画像のパスをここに入れると、その画像が優先的に使われます。
// 空欄のままにしておくと、白黒のシンプルな顔アイコン(絵文字ではなく生成SVG)が自動的に使われます。
// 例: ['images/face1.png','images/face2.png','images/face3.png','images/face4.png','images/face5.png']
const RATING_IMAGE_OVERRIDES = ['', '', '', '', ''];

function ratingImageSrc(level) {
  const custom = RATING_IMAGE_OVERRIDES[level - 1];
  if (custom) return custom;
  return buildFaceSVG(level);
}

// レベル1(とても不満)〜5(とても満足)の白黒の表情アイコンを生成します。
function buildFaceSVG(level) {
  const mouthYByLevel = { 1: 48, 2: 58, 3: 65, 4: 76, 5: 87 };
  const mouthY = mouthYByLevel[level] ?? 65;
  const brows = level <= 2
    ? `<path d="M 24 28 L 40 33" stroke="#333" stroke-width="3" stroke-linecap="round"/>
       <path d="M 76 28 L 60 33" stroke="#333" stroke-width="3" stroke-linecap="round"/>`
    : '';
  // レベル5(大変満足)だけは、口を半円形のアイコンにする(中は白抜き、輪郭のみ塗る)
  const mouth = level === 5
    ? `<path d="M 28 60 A 22 22 0 0 0 72 60 Z" fill="#f2f2f2" stroke="#2b2b2b" stroke-width="4" stroke-linejoin="round"/>`
    : `<path d="M 30 65 Q 50 ${mouthY} 70 65" fill="none" stroke="#2b2b2b" stroke-width="4" stroke-linecap="round"/>`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="42" fill="#f2f2f2" stroke="#333333" stroke-width="3"/>
    ${brows}
    <circle cx="35" cy="42" r="4.5" fill="#2b2b2b"/>
    <circle cx="65" cy="42" r="4.5" fill="#2b2b2b"/>
    ${mouth}
  </svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

// ─── State ───────────────────────────────────────────────
let current = 0; // current slide id (0-5)
const answers = {
  genderIndex: null,
  ageIndex: null,
  rating: null,        // '1'..'5'
  sourceIndex: null,
  sourceOther: '',
  improvements: new Set(), // indices into TR.improvements
  feedback: '',
};

// ─── GAS ─────────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbzu_TmTcwlHsdv1T-7KrVlCwr3hB9wtcaU4Qyxy206Wq0CxSy-FpuqkvEf_Z6RdALdO/exec";

// 送信時刻を「日本時間(JST)」の文字列に変換して取得する
// （利用者が海外にいてもブラウザのタイムゾーンに左右されず、常に日本時間で記録するため）
function getJSTTimestamp() {
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false,
  }).formatToParts(new Date());
  const get = (type) => parts.find(p => p.type === type).value;
  return `${get('year')}/${get('month')}/${get('day')} ${get('hour')}:${get('minute')}:${get('second')}`;
}

// ─── Helpers ─────────────────────────────────────────────
function t() { return TR; }
// Sequence of slide ids that make up the current flow.
// 改善点フィードバック(slide 4)は評価の値にかかわらず常に表示します。
function getFlow() { return [0,1,2,3,4,5]; }

function renderAll() {
  const tr = t();
  document.getElementById('headerTitle').textContent = tr.headerTitle;
  document.getElementById('headerSub').textContent   = tr.headerSub;
  renderProgress();
  renderSlide0();
  renderSlide1();
  renderSlide2();
  renderSlide3();
  renderSlide4();
  renderSlide5();
}

function stepLabelFor(idx, tr) {
  switch (idx) {
    case 0: return tr.stepsLabels.gender;
    case 1: return tr.stepsLabels.age;
    case 2: return tr.stepsLabels.rating;
    case 3: return tr.stepsLabels.source;
    case 4: return tr.stepsLabels.improvement;
    case 5: return tr.stepsLabels.feedback;
  }
}

function updateQLabel(slideIdx) {
  const tr = t();
  const seq = getFlow();
  const pos = seq.indexOf(slideIdx);
  const n = pos === -1 ? seq.length : pos + 1;
  const el = document.getElementById('ql-' + slideIdx);
  if (el) el.textContent = tr.qPrefix + String(n).padStart(2, '0') + tr.qSuffix;
}

function renderProgress() {
  const tr = t();
  const seq = getFlow();
  const pos = seq.indexOf(current);
  const ps = document.getElementById('progressSteps');
  ps.innerHTML = '';
  seq.forEach((slideIdx, i) => {
    const node = document.createElement('div');
    node.className = 'step-node' + (i === pos ? ' active' : '');
    const circle = document.createElement('div');
    circle.className = 'step-circle' + (i < pos ? ' done' : i === pos ? ' active' : '');
    if (i < pos) {
      circle.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 10 18 20 6"></polyline></svg>';
    } else {
      circle.textContent = String(i + 1);
    }
    const label = document.createElement('div');
    label.className = 'step-label';
    label.textContent = stepLabelFor(slideIdx, tr);
    node.appendChild(circle);
    node.appendChild(label);
    ps.appendChild(node);
    if (i < seq.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'step-connector';
      ps.appendChild(conn);
    }
  });
}

// ─── Slide 0: Gender ───────────────────────────────────────
function renderSlide0() {
  const tr = t();
  updateQLabel(0);
  document.getElementById('qt-0').textContent = tr.questions.gender;
  const container = document.getElementById('opts-0');
  container.innerHTML = '';
  tr.genders.forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers.genderIndex === i ? ' selected' : '');
    btn.textContent = g;
    btn.onclick = () => {
      answers.genderIndex = i;
      Array.from(container.children).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      // 単一選択なので、選んだ瞬間に自動で次の質問へ進む。
      setTimeout(() => next(0), 220);
    };
    container.appendChild(btn);
  });
}

function renderSlide1() {
  const tr = t();

  const container = document.getElementById('opts-1');

// ─── Slide 2: Rating ─────────────────────────────────────────
function renderSlide2() {
  const tr = t();
  updateQLabel(2);
  document.getElementById('qt-2').textContent = tr.questions.rating;
  const container = document.getElementById('opts-2');
  container.innerHTML = '';
  for (let v = 1; v <= 5; v++) {
    const btn = document.createElement('button');
    btn.className = 'rating-opt' + (answers.rating === String(v) ? ' selected' : '');
    const img = document.createElement('img');
    img.src = ratingImageSrc(v);
    img.alt = tr.ratingLabels[v-1];
    const label = document.createElement('span');

    label.textContent = tr.ratingLabels[v-1];

      answers.rating = val;
      renderSlide2();
      renderProgress();
      // 単一選択なので、選んだ瞬間に自動で次の質問へ進む
      setTimeout(() => next(2), 220);
    };

  }

// ─── Slide 3: Source (来店きっかけ) ───────────────────────────
function renderSlide3() {
  const tr = t();
  updateQLabel(3);
  document.getElementById('qt-3').textContent = tr.questions.source;
  const container = document.getElementById('opts-3');
  container.innerHTML = '';
  tr.sources.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (answers.sourceIndex === i ? ' selected' : '');

      renderSlide3();
      // 単一選択なので、選んだ瞬間に自動で次の質問へ進む(その他の場合は入力を待つ)
      const isOtherChoice = i === tr.sources.length - 1;
      if (!isOtherChoice) {
        setTimeout(() => next(3), 220);
      }
    };
    container.appendChild(btn);
  });

  const isOther = answers.sourceIndex === tr.sources.length - 1;
  const otherWrap  = document.getElementById('sourceOtherWrap');
  const otherInput = document.getElementById('sourceOtherInput');
  otherWrap.style.display = isOther ? 'block' : 'none';
  otherInput.placeholder = tr.sourceOtherPlaceholder;
  otherInput.value = answers.sourceOther;
  otherInput.oninput = (e) => { answers.sourceOther = e.target.value; };

  document.getElementById('btn-3').style.display = isOther ? 'block' : 'none';
  document.getElementById('btn-3').textContent = tr.nextBtn;

// ─── Slide 4: Improvement (改善ポイント) ──────────────────────
function renderSlide4() {
  const tr = t();
  updateQLabel(4);
  document.getElementById('qt-4').textContent = tr.questions.improvementTitle;
  document.getElementById('q4-optional').textContent = tr.optionalTag;
  const container = document.getElementById('opts-4');
  container.innerHTML = '';
  tr.improvements.forEach((s, i) => {
    const btn = document.createElement('button');
    const selected = answers.improvements.has(i);
    btn.className = 'opt' + (selected ? ' selected' : '');
    btn.textContent = s;
    btn.onclick = () => {
      if (answers.improvements.has(i)) answers.improvements.delete(i);
      else answers.improvements.add(i);
      renderSlide4();
    };
    container.appendChild(btn);
  });
  document.getElementById('btn-4').textContent = tr.nextBtn;
  document.getElementById('btn-4').disabled = false; // optional
}

// ─── Slide 5: Comment (コメント) ──────────────────────────────
function renderSlide5() {
  const tr = t();
  updateQLabel(5);
  document.getElementById('qt-5').textContent = tr.questions.feedback;
  document.getElementById('q5-optional').textContent = tr.optionalTag;
  document.getElementById('feedback').placeholder = tr.feedbackPlaceholder;
  document.getElementById('btn-5').textContent = tr.submitBtn;

// ─── Navigation ───────────────────────────────────────────
function navigate(from, to, beforeShow) {
  const fromEl = document.getElementById('slide-' + from);
  const toEl   = document.getElementById('slide-' + to);
  const forward = to > from;

  fromEl.style.animation = '';
  fromEl.style.animationName = forward ? 'slideOut' : 'slideOutReverse';
  fromEl.classList.add('exit');

  setTimeout(() => {
    fromEl.classList.remove('active', 'exit');
    fromEl.style.animation = '';
    if (beforeShow) beforeShow();
    if (!forward) {
      toEl.style.animation = 'slideInReverse .45s cubic-bezier(.16,1,.3,1) forwards';
    }
    toEl.classList.add('active');
    current = to;
    renderProgress();
    if (!forward) {
      setTimeout(() => { toEl.style.animation = ''; }, 500);
    }
  }, 350);
}

// Extra keyframes for the "back" direction
const styleEl = document.createElement('style');
styleEl.textContent = `
  @keyframes slideOutReverse {
    from { opacity:1; transform:translateX(0); }
    to   { opacity:0; transform:translateX(28px); }
  }
  @keyframes slideInReverse {
    from { opacity:0; transform:translateX(-28px); }
    to   { opacity:1; transform:translateX(0); }
  }
`;
document.head.appendChild(styleEl);

function next(step, beforeShow) { navigate(step, step + 1, beforeShow); }
function back(step) { navigate(step, step - 1); }

// ─── Submit ───────────────────────────────────────────────
async function submitSurvey() {
  answers.feedback = document.getElementById('feedback').value;
  const btn = document.getElementById('btn-5');
  btn.disabled = true;
  btn.textContent = '…';

  const tr = t();
  const genderText = answers.genderIndex === null ? '' : tr.genders[answers.genderIndex];
  const ageText     = answers.ageIndex === null ? '' : tr.ages[answers.ageIndex];
  const sourceText = answers.sourceIndex === null ? '' :
    (answers.sourceIndex === tr.sources.length - 1 && answers.sourceOther
      ? `${tr.sources[answers.sourceIndex]}（${answers.sourceOther}）`
      : tr.sources[answers.sourceIndex]);
  const improvementText = Array.from(answers.improvements).map(i => tr.improvements[i]).join('、');
  // 改善点の回答がある場合は、【】で囲んでフィードバック本文の先頭に付けて出力する
  const combinedFeedback = improvementText
    ? `【${improvementText}】${answers.feedback ? '\n' + answers.feedback : ''}`
    : answers.feedback;

  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        timestamp:    getJSTTimestamp(),
        gender:       genderText,
        age:          ageText,
        rating:       answers.rating,
        source:       sourceText,
        improvements: improvementText,
        feedback:     combinedFeedback,
      })
    });
  } catch(e) { console.error(e); }

  showThankyou();
}

// ─── Thank you ────────────────────────────────────────────
function showThankyou() {
  const tr = t();
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('slideViewport').style.display = 'none';
  document.querySelector('.header').style.display = 'none';

  const ty = document.getElementById('thankyou');
  ty.classList.add('show');

  const rule = document.getElementById('tyRule');
  const main = document.getElementById('tyMain');
  const sub  = document.getElementById('tySub');
  const face = document.getElementById('tyFace');

  main.textContent = tr.tyMain;
  sub.textContent  = tr.tySub;

  if (answers.rating === '4' || answers.rating === '5') {
    face.src = ratingImageSrc(Number(answers.rating));
    face.style.display = 'block';
  } else {
    face.removeAttribute('src');
    face.style.display = 'none';
  }

  // Stagger animations
  setTimeout(() => spawnPetals(),                 500);
  setTimeout(() => rule.classList.add('visible'), 200);
  setTimeout(() => main.classList.add('visible'), 400);
  setTimeout(() => sub.classList.add('visible'),  700);
  setTimeout(() => face.classList.add('visible'), 1250);
}

// 配列の要素をランダムな順序に並べ替える(Fisher–Yates)
function shuffledIndices(count) {
  const arr = Array.from({ length: count }, (_, i) => i);
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function spawnPetals() {
  const container = document.getElementById('sakuraLayer');
  container.innerHTML = '';
  const count = 18;
  const cycleSpan = 4.2; // 出現タイミングを分散させる範囲(秒)

  // 横位置と出現タイミングをそれぞれ別々にシャッフルすることで、
  // 「左から右へ順番に降る」ような機械的な並びにならず、ランダムな降り方に見せる。
  // (帯を区切ってその中でランダム化するので、一箇所に固まりすぎることもない)
  const laneOrder  = shuffledIndices(count);
  const timeOrder  = shuffledIndices(count);
  const laneWidth  = 100 / count;
  const timeSlot   = cycleSpan / count;

  for (let i = 0; i < count; i++) {
    const span = document.createElement('span');
    span.className = 'petal';
    const size  = 6 + Math.random() * 5;              // 6px〜11px
    const dur   = 4 + Math.random() * 2.8;             // 4s〜6.8s
    const left  = laneOrder[i] * laneWidth + Math.random() * laneWidth;
    const delay = timeOrder[i] * timeSlot + Math.random() * timeSlot;
    const drift = 12 + Math.random() * 44;             // 左右への揺れ幅
    const rot   = Math.random() * 360;                 // 回転角度
    span.style.left = Math.min(99, Math.max(0, left)) + '%';
    span.style.setProperty('--size',  size + 'px');
    span.style.setProperty('--dur',   dur + 's');
    span.style.setProperty('--delay', delay + 's');
    span.style.setProperty('--drift', (Math.random() > .5 ? drift : -drift) + 'px');
    span.style.setProperty('--rot',   rot + 'deg');
    container.appendChild(span);
  }
}

renderAll();
